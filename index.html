<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>TechGirl Engineering</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<style>

/* ================= CUBO WIREFRAME ================= */
.cube-container {
    width: 300px;
    height: 300px;
    margin: 60px auto;
    perspective: 1000px;
}

.cube {
    width: 300px;
    height: 300px;
    position: relative;
    transform-style: preserve-3d;
    transform: rotateX(-20deg) rotateY(25deg);
}

/* cada face */
.face {
    position: absolute;
    width: 300px;
    height: 300px;
    border: 2px solid rgba(255, 255, 255, 0.8);
    background: transparent;
}

/* posicionamento 3D das faces */
.front  { transform: translateZ(150px); }
.back   { transform: rotateY(180deg) translateZ(150px); }
.right  { transform: rotateY(90deg) translateZ(150px); }
.left   { transform: rotateY(-90deg) translateZ(150px); }
.top    { transform: rotateX(90deg) translateZ(150px); }
.bottom { transform: rotateX(-90deg) translateZ(150px); }

</style>
</head>

<body class="light-mode">

<canvas id="particle-canvas"></canvas>

<header>
<div class="container nav-container">
    <div class="logo">
        <span class="logo-icon">⚙️</span>
        <span class="logo-text">TechGirl Engineering</span>
    </div>

    <nav>
        <ul>
            <li><a href="#home">Início</a></li>
            <li><a href="#eletronica">Eletrónica</a></li>
            <li><a href="#mecanica">Mecânica</a></li>
            <li><a href="contato.html">Contato</a></li>
        </ul>
    </nav>

    <button id="theme-toggle">🌙</button>
</div>
</header>

<!-- ================= HOME ================= -->
<section id="home" class="hero">
<div class="container">
    <h2>Engenharia com Cor, Potência e Precisão</h2>
    <p>Peças de eletrónica e mecânica para mentes criativas e inovadoras.</p>

    <!-- 🔽 CUBO IGUAL À IMAGEM 🔽 -->
    <div class="cube-container">
        <div class="cube">
            <div class="face front"></div>
            <div class="face back"></div>
            <div class="face right"></div>
            <div class="face left"></div>
            <div class="face top"></div>
            <div class="face bottom"></div>
        </div>
    </div>

    <a href="#eletronica" class="btn">Explorar Produtos</a>
</div>
</section>

</html>
