<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>TechGirl Engineering</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

<style>

/* ================= CUBO WIREFRAME ================= */
.cube-container {
    width: 300px;
    height: 300px;
    margin: 60px auto;
    perspective: 1000px;
}

.cube {
    width: 300px;
    height: 300px;
    position: relative;
    transform-style: preserve-3d;
    transform: rotateX(-20deg);
    animation: spin 10s linear infinite;
}

/* rotação */
@keyframes spin {
    0%   { transform: rotateX(-20deg) rotateY(0deg); }
    100% { transform: rotateX(-20deg) rotateY(360deg); }
}

/* faces */
.face {
    position: absolute;
    width: 300px;
    height: 300px;
    border: 2px solid rgba(255, 255, 255, 0.8);
    overflow: hidden;
}

/* imagens ajustadas */
.face img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

/* posicionamento 3D */
.front  { transform: translateZ(150px); }
.back   { transform: rotateY(180deg) translateZ(150px); }
.right  { transform: rotateY(90deg) translateZ(150px); }
.left   { transform: rotateY(-90deg) translateZ(150px); }
.top    { transform: rotateX(90deg) translateZ(150px); }
.bottom { transform: rotateX(-90deg) translateZ(150px); }

</style>
</head>

<body class="light-mode">

<canvas id="particle-canvas"></canvas>

<header>
    <div class="container nav-container">
        <div class="logo">
            <span class="logo-icon">⚙️</span>
            <span class="logo-text">TechGirl Engineering</span>
        </div>

        <nav>
            <ul>
                <li><a href="#home">Início</a></li>
                <li><a href="#eletronica">Eletrónica</a></li>
                <li><a href="#mecanica">Mecânica</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>

        <button id="theme-toggle">🌙</button>
    </div>
</header>

<section id="home" class="hero">
    <div class="container">
        <h2>Engenharia com Cor, Potência e Precisão</h2>
        <p>Peças de eletrónica e mecânica para mentes criativas e inovadoras.</p>

        <div class="cube-container">
            <div class="cube">

                <div class="face front">
                    <a href="eletronica.html">
                        <img src="https://picsum.photos/id/180/500/300">
                    </a>
                </div>

                <div class="face back">
                    <a href="mecanica.html">
                        <img src="https://picsum.photos/id/250/500/300">
                    </a>
                </div>

                <div class="face right">
                    <a href="sensores.html">
                        <img src="https://picsum.photos/id/365/500/300">
                    </a>
                </div>

                <div class="face left">
                    <a href="componentes.html">
                        <img src="https://picsum.photos/id/431/500/300">
                    </a>
                </div>

                <div class="face top">
                    <a href="microcontroladores.html">
                        <img src="https://picsum.photos/id/180/500/300">
                    </a>
                </div>

                <div class="face bottom">
                    <a href="contato.html">
                        <img src="https://picsum.photos/id/250/500/300">
                    </a>
                </div>

            </div>
        </div>

        <a href="#eletronica" class="btn">Explorar Produtos</a>
    </div>
</section>

<script>
const toggle = document.getElementById('theme-toggle');
toggle.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');
    document.body.classList.toggle('light-mode');
    toggle.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
});

const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for(let i=0;i<150;i++){
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*2+1,
        dx: (Math.random()-0.5)*0.5,
        dy: (Math.random()-0.5)*0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let p of particles){
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle = document.body.classList.contains('dark-mode')
            ? 'rgba(255,255,255,0.6)'
            : 'rgba(255,255,255,0.3)';
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;

        if(p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if(p.y < 0 || p.y > canvas.height) p.dy *= -1;
    }
    requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
